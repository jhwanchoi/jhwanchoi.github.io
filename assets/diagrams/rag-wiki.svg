<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="'JetBrains Mono',ui-monospace,monospace" role="img" aria-label="RAG knowledge wiki: hybrid retrieval and grounded LLM synthesis">
  <defs>
    <marker id="ahR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <style>
      .bg{fill:#0b1020}
      .box{fill:#131a2e;stroke:#1e293b;stroke-width:1.5}
      .t{fill:#e2e8f0;font-size:13px;font-weight:700}
      .s{fill:#94a3b8;font-size:10px}
      .cap{fill:#64748b;font-size:10px}
      .ttl{fill:#22d3ee;font-size:15px;font-weight:700}
      .lab{fill:#cbd5e1;font-size:9.5px}
      .hd{fill:#64748b;font-size:10px;font-weight:700;letter-spacing:1px}
      .arr{stroke:#475569;stroke-width:1.6;fill:none}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="820" height="360"/>
  <text class="ttl" x="22" y="34">RAG Knowledge Wiki — Hybrid Retrieval + Grounded Synthesis</text>
  <text class="cap" x="22" y="52">keyword + embedding retrieval → cited answers · CI-rebuilt vector index</text>

  <!-- INDEX BUILD lane -->
  <text class="hd" x="22" y="80">INDEX BUILD  (CI)</text>
  <rect class="box" x="22" y="90" width="150" height="64" rx="10"/>
  <rect x="22" y="90" width="5" height="64" rx="2.5" fill="#a78bfa"/>
  <text class="t" x="38" y="116">Git + Markdown</text>
  <text class="s" x="38" y="134">docs + frontmatter</text>

  <rect class="box" x="202" y="90" width="160" height="64" rx="10"/>
  <rect x="202" y="90" width="5" height="64" rx="2.5" fill="#a78bfa"/>
  <text class="t" x="218" y="116">GitHub Actions</text>
  <text class="s" x="218" y="134">build embedding index</text>

  <rect class="box" x="392" y="90" width="170" height="64" rx="10"/>
  <rect x="392" y="90" width="5" height="64" rx="2.5" fill="#a78bfa"/>
  <text class="t" x="408" y="116">Vector index (.npy)</text>
  <text class="s" x="408" y="134">text-embedding-3-small</text>
  <path class="arr" d="M172 122 H200" marker-end="url(#ahR)"/>
  <path class="arr" d="M362 122 H390" marker-end="url(#ahR)"/>

  <!-- divider -->
  <line x1="22" y1="180" x2="798" y2="180" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- QUERY lane -->
  <text class="hd" x="22" y="204">QUERY</text>
  <rect class="box" x="22" y="214" width="138" height="72" rx="10"/>
  <rect x="22" y="214" width="5" height="72" rx="2.5" fill="#22d3ee"/>
  <text class="t" x="38" y="242">User question</text>
  <text class="s" x="38" y="260">symptom / intent</text>

  <!-- hybrid retrieval emphasis -->
  <rect x="190" y="208" width="200" height="84" rx="10" fill="#0e2230" stroke="#22d3ee" stroke-width="1.8"/>
  <text class="t" x="206" y="234" fill="#bdf0fb">Hybrid retrieval</text>
  <text class="s" x="206" y="252" fill="#8fd6e8">grep field-scoring</text>
  <text class="s" x="206" y="266" fill="#8fd6e8">+ embedding cosine top-k</text>
  <text class="s" x="206" y="280" fill="#8fd6e8">+ synonym expansion</text>

  <rect class="box" x="420" y="214" width="150" height="72" rx="10"/>
  <rect x="420" y="214" width="5" height="72" rx="2.5" fill="#f59e0b"/>
  <text class="t" x="436" y="242">Context inject</text>
  <text class="s" x="436" y="260">top docs + sections</text>

  <rect x="600" y="208" width="196" height="84" rx="10" fill="#10241f" stroke="#3fb950" stroke-width="1.8"/>
  <text class="t" x="616" y="234" fill="#d6ffe6">LLM synthesis</text>
  <text class="s" x="616" y="252" fill="#7ee2a8">grounded answer</text>
  <text class="s" x="616" y="266" fill="#7ee2a8">+ citations</text>
  <text class="s" x="616" y="280" fill="#7ee2a8">+ freshness / uncertainty</text>

  <path class="arr" d="M160 250 H188" marker-end="url(#ahR)"/>
  <path class="arr" d="M390 250 H418" marker-end="url(#ahR)"/>
  <path class="arr" d="M570 250 H598" marker-end="url(#ahR)"/>

  <!-- index feeds retrieval -->
  <path class="arr" d="M477 154 V196 H300 V206" marker-end="url(#ahR)" stroke-dasharray="5 4"/>
  <text class="cap" x="486" y="174">index → retrieval</text>
</svg>
