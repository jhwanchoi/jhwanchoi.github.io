<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 414" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" role="img" aria-label="MLOps Platform — Shared GitOps + GPU Orchestration"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#5b677d"/></marker></defs><rect width="900" height="414" fill="#0b1020"/><text x="26" y="32" fill="#22d3ee" font-size="15" font-weight="700">MLOps Platform — Shared GitOps + GPU Orchestration</text><text x="26" y="51" fill="#7d8ba5" font-size="10.5">RKE2 cluster · ArgoCD app-of-apps · Airflow / Ray on 4 shared GPU nodes · SVEvalFlow on top</text><rect x="26" y="70" width="848" height="56" rx="11" fill="#10242b" stroke="#22d3ee" stroke-width="1.8"/><text x="42" y="94" fill="#f0f9ff" font-size="12.5" font-weight="700">SVEVALFLOW (inference / evaluation)</text><text x="42" y="114" fill="#c8d6e5" font-size="10.5">Inferit · MTBF Validation · PRISM</text><rect x="26" y="137" width="848" height="56" rx="11" fill="#131a2e" stroke="#1e293b" stroke-width="1.5"/><rect x="26" y="137" width="5" height="56" rx="2.5" fill="#a78bfa"/><text x="44" y="161" fill="#e2e8f0" font-size="12.5" font-weight="700">ORCHESTRATION &amp; MLOPS</text><text x="44" y="181" fill="#9fb0c3" font-size="10.5">Airflow (KubernetesPodOperator) · Ray / KubeRay · MLflow · lakeFS · Harbor · Redis</text><rect x="26" y="204" width="848" height="56" rx="11" fill="#131a2e" stroke="#1e293b" stroke-width="1.5"/><rect x="26" y="204" width="5" height="56" rx="2.5" fill="#3fb950"/><text x="44" y="228" fill="#e2e8f0" font-size="12.5" font-weight="700">GITOPS &amp; SECRETS</text><text x="44" y="248" fill="#9fb0c3" font-size="10.5">GitHub Actions (self-hosted ARC) · ArgoCD app-of-apps · External Secrets · Grafana / Prometheus / Loki</text><rect x="26" y="271" width="848" height="56" rx="11" fill="#131a2e" stroke="#1e293b" stroke-width="1.5"/><rect x="26" y="271" width="5" height="56" rx="2.5" fill="#f59e0b"/><text x="44" y="295" fill="#e2e8f0" font-size="12.5" font-weight="700">RKE2 CLUSTER + STORAGE</text><text x="44" y="315" fill="#9fb0c3" font-size="10.5">control plane · 4 GPU workers (RTX 3090–6000) · service nodes · object store (S3) + NFS</text><rect x="26" y="342" width="220" height="26" rx="7" fill="#0f1626" stroke="#1e293b" stroke-width="1"/><text x="39" y="359" fill="#cbd5e1" font-size="10">● led scheduler &amp; GPU-quota policy</text><rect x="254" y="342" width="226" height="26" rx="7" fill="#0f1626" stroke="#1e293b" stroke-width="1"/><text x="267" y="359" fill="#cbd5e1" font-size="10">● KubernetesPodOperator GPU fan-out</text><rect x="488" y="342" width="280" height="26" rx="7" fill="#0f1626" stroke="#1e293b" stroke-width="1"/><text x="501" y="359" fill="#cbd5e1" font-size="10">● GitOps: GitHub → Harbor → ArgoCD → cluster</text><rect x="26" y="374" width="262" height="26" rx="7" fill="#0f1626" stroke="#1e293b" stroke-width="1"/><text x="39" y="391" fill="#cbd5e1" font-size="10">● secrets via External Secrets + cloud SM</text></svg>